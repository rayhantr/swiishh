<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#0c0e13" />
  <title>404 — air ball · SWIISHH</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#0c0e13; --asphalt:#171a21; --chalk:#f0ebe0; --amber:#ffb454; --flame:#ff6a3d; }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; }
    body {
      display: grid; place-items: center; text-align: center; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, #1a1e27 0%, var(--ink) 60%);
      color: var(--chalk); font-family: 'IBM Plex Mono', ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
    }
    .code { font-family: 'Bungee', 'Arial Black', sans-serif; font-size: clamp(64px, 18vw, 160px); line-height: 1; color: var(--chalk); }
    .code .dot { color: var(--flame); }
    h1 { font-family: 'Bungee', sans-serif; font-size: clamp(20px, 5vw, 34px); margin: 8px 0 6px; letter-spacing: 1px; }
    p { color: rgba(240,235,224,0.6); max-width: 38ch; margin: 0 auto 28px; line-height: 1.5; }
    a.btn {
      display: inline-block; text-decoration: none; color: var(--ink); background: var(--amber);
      font-weight: 600; padding: 14px 26px; border-radius: 999px; letter-spacing: 0.5px;
      transition: transform .12s ease, background .12s ease;
    }
    a.btn:hover { transform: translateY(-2px); background: var(--flame); }
  </style>
</head>
<body>
  <main>
    <div class="code" aria-hidden="true">4<span class="dot">0</span>4</div>
    <h1>Air ball.</h1>
    <p>That page rolled out of bounds. Let's get you back to the line.</p>
    <a class="btn" href="/">← Back to the court</a>
  </main>
</body>
</html>
